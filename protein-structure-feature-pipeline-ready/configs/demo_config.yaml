project:
  name: protein-structure-feature-pipeline
  version: demo_v0.1

input:
  manifest: example_data/manifest/demo_manifest.csv
  fasta_dirs:
    - example_data/raw/fasta
  mmcif_dir: example_data/raw/mmcif
  map_table: example_data/raw/maps/map_paths.csv
  sifts_cache: .cache/sifts_uniprot
  web_roots:
    - example_data/raw/web
  batch_root: example_data/raw/batch

output:
  json_root: example_outputs/json
  manifest_skeleton: example_outputs/manifest/manifest_skeleton.csv
  qc_dir: example_outputs/qc

external_tools:
  iupred_cmd: ""
  chimerax_cmd: "chimerax"
  mkdssp_cmd: "mkdssp"

batch:
  batch_size: 3000
  batch_index: 0
