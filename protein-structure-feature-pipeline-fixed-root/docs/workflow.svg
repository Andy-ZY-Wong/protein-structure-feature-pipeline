<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Protein structure feature and annotation pipeline workflow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444" />
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:1.5; rx:12; }
      .box2 { fill:#eef2ff; stroke:#3730a3; stroke-width:1.5; rx:12; }
      .box3 { fill:#ecfdf5; stroke:#047857; stroke-width:1.5; rx:12; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#111827; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size:20px; font-weight:700; fill:#111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size:12px; fill:#374151; }
      .arrow { stroke:#444; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="30" y="34" class="title">Protein Structure Feature Extraction and Chain-level Annotation Workflow</text>

  <rect x="30" y="70" width="170" height="68" class="box" />
  <text x="48" y="98" class="text">Raw inputs</text>
  <text x="48" y="118" class="small">PDB/mmCIF, FASTA, maps</text>

  <rect x="250" y="70" width="170" height="68" class="box" />
  <text x="268" y="98" class="text">00 Manifest</text>
  <text x="268" y="118" class="small">entry-level file index</text>

  <rect x="470" y="70" width="170" height="68" class="box2" />
  <text x="488" y="98" class="text">01 Skeleton</text>
  <text x="488" y="118" class="small">entry / chain JSON</text>

  <rect x="690" y="70" width="230" height="68" class="box2" />
  <text x="708" y="98" class="text">02 Local tracks</text>
  <text x="708" y="118" class="small">DSSP, RSA, hydropathy, QC</text>

  <rect x="150" y="195" width="220" height="68" class="box2" />
  <text x="168" y="223" class="text">03/04 Disorder &amp; Q-score</text>
  <text x="168" y="243" class="small">IUPred2A, ChimeraX/QScore</text>

  <rect x="430" y="195" width="220" height="68" class="box3" />
  <text x="448" y="223" class="text">07 UniProt / SIFTS</text>
  <text x="448" y="243" class="small">residue-level annotation mapping</text>

  <rect x="710" y="195" width="220" height="68" class="box3" />
  <text x="728" y="223" class="text">07b/07c/09/11 Repair</text>
  <text x="728" y="243" class="small">fallback and problem-chain repair</text>

  <rect x="270" y="320" width="220" height="68" class="box3" />
  <text x="288" y="348" class="text">08 Annotation groups</text>
  <text x="288" y="368" class="small">Pfam, InterPro, UniProt tracks</text>

  <rect x="560" y="320" width="220" height="68" class="box" />
  <text x="578" y="348" class="text">10 Final QC</text>
  <text x="578" y="368" class="small">chain-level summaries and reports</text>

  <path d="M200 104 H250" class="arrow" />
  <path d="M420 104 H470" class="arrow" />
  <path d="M640 104 H690" class="arrow" />
  <path d="M805 138 C805 165 260 165 260 195" class="arrow" />
  <path d="M370 229 H430" class="arrow" />
  <path d="M650 229 H710" class="arrow" />
  <path d="M820 263 C820 300 380 290 380 320" class="arrow" />
  <path d="M490 354 H560" class="arrow" />
</svg>
